# Example rendering of the cloud-init user-data that Ghost injects per
# server. The real one is generated by lib/workflows/steps.ts > buildCloudInit.
#cloud-config
write_files:
  - path: /etc/ghost/bootstrap.json
    owner: root:root
    permissions: "0600"
    content: |
      {"serverId":"01JQ...","bootstrapToken":"eyJ...","apiBaseUrl":"https://ghost.app"}
runcmd:
  - systemctl daemon-reload
  - systemctl enable --now ghost-agent.service
  - ufw allow 25565/tcp || true
