# Example rendering of the cloud-init user-data that Ultrabeam injects per
# server. The real one is generated by lib/workflows/steps.ts > buildCloudInit.
#cloud-config
write_files:
  - path: /etc/ultrabeam/bootstrap.json
    owner: root:root
    permissions: '0600'
    content: |
      {"serverId":"01JQ...","bootstrapToken":"eyJ...","apiBaseUrl":"https://ultrabeam.app"}
runcmd:
  - systemctl daemon-reload
  - systemctl enable --now ultrabeam-agent.service
  - ufw allow 25565/tcp || true
